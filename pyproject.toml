[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
  "rvn.py",
  "mouse/makcu.py",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "UP",
  "B",
  "SIM",
]
ignore = [
  "E501",  # long lines (UI strings, HTML, etc.)
]

[tool.ruff.lint.per-file-ignores]
"rvn.py" = [
  "E402",  # imports not at top (file is monolithic; refactor later)
  "B007",  # loop control variable not used
  "I001",  # import sorting (monolithic file; refactor later)
  "UP035", # typing.List deprecation (large file; refactor later)
]
"mouse/makcu.py" = [
  "I001",   # import sorting
  "SIM105", # prefer contextlib.suppress (keep simple for vendor/controller glue)
]

