name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile
        run: |
          python -m compileall rvn.py mouse

      - name: Unit tests
        run: |
          python rvn.py --test

  build-exe:
    name: Build RVN.exe (Nuitka)
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build (onefile)
        run: |
          .\scripts\build_nuitka.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RVN.exe
          path: dist/RVN.exe

